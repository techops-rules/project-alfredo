// ─────────────────────────────────────────────────────────────────────────────
// SWIPE ROW — iOS-style left/right swipe reveals.
// Swipe LEFT reveals a red DELETE action; past threshold → onSwipeLeft.
// Swipe RIGHT reveals an amber ARCHIVE action; past threshold → onSwipeRight.
// ─────────────────────────────────────────────────────────────────────────────
window.SwipeRow = SwipeRow;
function SwipeRow({ children, onSwipeLeft, onSwipeRight, leftLabel = 'ARCHIVE', rightLabel = 'DELETE', className = '' }) {
  const [dx, setDx] = useState(0);
  const startX = React.useRef(null);
  const threshold = 72;

  const onPointerDown = (e) => {
    if (e.target.closest('button, input, textarea, a')) return;
    startX.current = e.clientX;
    e.currentTarget.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (startX.current == null) return;
    const delta = e.clientX - startX.current;
    // damp past threshold so it doesn't run away
    setDx(Math.abs(delta) > threshold ? (delta > 0 ? threshold + (delta - threshold) * 0.3 : -threshold + (delta + threshold) * 0.3) : delta);
  };
  const onPointerUp = () => {
    if (startX.current == null) return;
    startX.current = null;
    if (dx > threshold) {
      onSwipeRight && onSwipeRight();
      setDx(0);
    } else if (dx < -threshold) {
      onSwipeLeft && onSwipeLeft();
      setDx(0);
    } else {
      setDx(0);
    }
  };
  const leftVisible = dx > 4;
  const rightVisible = dx < -4;
  return (
    <div className={`swipe-row ${className}`}>
      {leftVisible && (
        <div className="swipe-action swipe-right-action" style={{ width: Math.min(dx, 120) + 'px' }}>
          <span>{leftLabel}</span>
        </div>
      )}
      {rightVisible && (
        <div className="swipe-action swipe-left-action" style={{ width: Math.min(-dx, 120) + 'px' }}>
          <span>{rightLabel}</span>
        </div>
      )}
      <div
        className="swipe-row-content"
        style={{ transform: `translateX(${dx}px)`, transition: startX.current ? 'none' : 'transform 160ms ease-out' }}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={() => { startX.current = null; setDx(0); }}
      >
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SUBTASK TREE — recursive. Each node can have children (nested indefinitely).
// ─────────────────────────────────────────────────────────────────────────────
function SubtaskTree({ subtasks, expanded, setExpanded, onChange, depth = 0 }) {
  const update = (id, patch) => onChange(subtasks.map(s => s.id === id ? { ...s, ...patch } : s));
  const remove = (id) => onChange(subtasks.filter(s => s.id !== id));
  const addChild = (parentId) => {
    onChange(subtasks.map(s => {
      if (s.id !== parentId) return s;
      const newChild = { id: 'st-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 4), text: '', done: false, notes: '', subtasks: [] };
      return { ...s, subtasks: [...(s.subtasks || []), newChild] };
    }));
    setExpanded(prev => ({ ...prev, [parentId]: true }));
  };
  return (
    <>
      {subtasks.map(s => {
        const hasKids = (s.subtasks || []).length > 0;
        const isExp = expanded[s.id];
        return (
          <div key={s.id} className={`pi-sub ${s.done ? 'done' : ''}`} style={{ marginLeft: depth * 14 }}>
            <div className="pi-sub-row">
              <button className="pi-sub-check" onClick={() => update(s.id, { done: !s.done })}>
                {s.done ? '◉' : '○'}
              </button>
              <input
                className="pi-sub-text"
                value={s.text}
                onChange={e => update(s.id, { text: e.target.value })}
                placeholder="subtask…"
              />
              <button
                className="pi-sub-expand"
                onClick={() => setExpanded(prev => ({ ...prev, [s.id]: !prev[s.id] }))}
                title="expand notes/children"
              >{isExp ? '▾' : '▸'}</button>
              <button className="pi-sub-expand" onClick={() => addChild(s.id)} title="add child subtask">+</button>
              <button className="pi-sub-del" onClick={() => remove(s.id)}>×</button>
            </div>
            {isExp && (
              <>
                <textarea
                  className="pi-sub-notes"
                  value={s.notes || ''}
                  onChange={e => update(s.id, { notes: e.target.value })}
                  placeholder="notes, links…"
                  rows={2}
                />
                {hasKids && (
                  <div className="pi-sub-kids">
                    <SubtaskTree
                      subtasks={s.subtasks}
                      expanded={expanded}
                      setExpanded={setExpanded}
                      onChange={(nextKids) => update(s.id, { subtasks: nextKids })}
                      depth={depth + 1}
                    />
                  </div>
                )}
              </>
            )}
          </div>
        );
      })}
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// PROJECT INSPECTOR — tap a project → edit meta, collapsible subtasks, add/delete.
// ─────────────────────────────────────────────────────────────────────────────
function ProjectInspector({ project, onClose, onUpdate, onDelete, onArchive }) {
  const [name, setName] = useState(project.name);
  const [next, setNext] = useState(project.next || '');
  const [state, setState] = useState(project.state || 'ACTIVE');
  const [health, setHealth] = useState(project.health || 'green');
  const [subtasks, setSubtasks] = useState(project.subtasks || []);
  const [expandedSub, setExpandedSub] = useState({});
  const [newSubText, setNewSubText] = useState('');

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const commit = () => onUpdate(project.id, { name: name.toUpperCase(), next, state, health, subtasks });

  const updateSub = (id, patch) => {
    setSubtasks(prev => prev.map(s => s.id === id ? { ...s, ...patch } : s));
  };
  const addSub = () => {
    const t = newSubText.trim();
    if (!t) return;
    setSubtasks(prev => [...prev, { id: 's-' + Date.now().toString(36), text: t, done: false, notes: '' }]);
    setNewSubText('');
  };
  const deleteSub = (id) => setSubtasks(prev => prev.filter(s => s.id !== id));

  return (
    <div className="scratch-inspector-backdrop" onClick={onClose}>
      <div className="scratch-inspector" onClick={e => e.stopPropagation()} style={{ width: 520 }}>
        <div className="scratch-insp-head">
          <span>PROJECT · {project.status === 'archive' ? 'ARCHIVED' : project.status === 'trash' ? 'TRASH' : 'ACTIVE'}</span>
          <button className="tweaks-close" onClick={onClose}>✕</button>
        </div>

        <div className="scratch-insp-body">
          <div className="scratch-insp-section">
            <div className="scratch-insp-label">NAME</div>
            <input className="pi-input" value={name} onChange={e => setName(e.target.value)} onBlur={commit} />
          </div>

          <div className="scratch-insp-section">
            <div className="scratch-insp-label">STATE · HEALTH</div>
            <div className="pi-row">
              <select className="pi-select" value={state} onChange={e => { setState(e.target.value); setTimeout(commit, 0); }}>
                <option>ACTIVE</option><option>DUE.TODAY</option><option>STALLED</option><option>BLOCKED</option>
              </select>
              <select className="pi-select" value={health} onChange={e => { setHealth(e.target.value); setTimeout(commit, 0); }}>
                <option value="green">● green</option><option value="yellow">● yellow</option><option value="red">● red</option>
              </select>
            </div>
          </div>

          <div className="scratch-insp-section">
            <div className="scratch-insp-label">NEXT</div>
            <input className="pi-input" value={next} onChange={e => setNext(e.target.value)} onBlur={commit} placeholder="what's the next action?" />
          </div>

          <div className="scratch-insp-section">
            <div className="scratch-insp-label">SUBTASKS · {subtasks.length} (nestable)</div>
            <div className="pi-subs">
              {subtasks.length === 0 && <div className="pi-empty">no subtasks yet — add one below</div>}
              <SubtaskTree
                subtasks={subtasks}
                expanded={expandedSub}
                setExpanded={setExpandedSub}
                onChange={(next) => { setSubtasks(next); setTimeout(commit, 0); }}
                depth={0}
              />
              <div className="pi-sub-add">
                <span className="pi-sub-check" style={{ color: 'var(--muted-dim)' }}>◌</span>
                <input
                  className="pi-sub-text"
                  value={newSubText}
                  onChange={e => setNewSubText(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') { addSub(); setTimeout(commit, 0); } }}
                  placeholder="+ add subtask"
                />
              </div>
            </div>
          </div>
        </div>

        <div className="scratch-insp-foot">
          {project.status !== 'trash' && <button className="danger" onClick={() => { onDelete(project.id); onClose(); }}>🗑 DELETE</button>}
          {project.status === 'active' && <button onClick={() => { onArchive(project.id); onClose(); }} style={{color: 'var(--warn)', borderColor: 'var(--warn)'}}>📦 ARCHIVE</button>}
          <button onClick={onClose}>DONE</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENT INSPECTOR — tap a calendar event → edit title/time/location, tag, hide, delete.
// ─────────────────────────────────────────────────────────────────────────────
function EventInspector({ event, eventKey, override, onUpdate, onClose }) {
  const merged = { ...event, ...(override?.edits || {}) };
  const [title, setTitle] = useState(merged.title);
  const [time, setTime] = useState(merged.time);
  const [where, setWhere] = useState(merged.where || '');
  const [tags, setTags] = useState((override?.tags || [merged.tag]).filter(Boolean));
  const [newTag, setNewTag] = useState('');
  const hidden = !!override?.hidden;

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const save = () => onUpdate(eventKey, { edits: { title, time, where }, tags });
  const addTag = () => {
    const t = newTag.trim().toUpperCase();
    if (t && !tags.includes(t)) {
      const next = [...tags, t];
      setTags(next);
      onUpdate(eventKey, { tags: next });
    }
    setNewTag('');
  };
  const removeTag = (t) => {
    const next = tags.filter(x => x !== t);
    setTags(next);
    onUpdate(eventKey, { tags: next });
  };

  return (
    <div className="scratch-inspector-backdrop" onClick={onClose}>
      <div className="scratch-inspector" onClick={e => e.stopPropagation()} style={{ width: 440 }}>
        <div className="scratch-insp-head">
          <span>EVENT{hidden ? ' · HIDDEN' : ''}</span>
          <button className="tweaks-close" onClick={onClose}>✕</button>
        </div>
        <div className="scratch-insp-body">
          <div className="scratch-insp-section">
            <div className="scratch-insp-label">TITLE</div>
            <input className="pi-input" value={title} onChange={e => setTitle(e.target.value)} onBlur={save} />
          </div>
          <div className="scratch-insp-section">
            <div className="scratch-insp-label">TIME</div>
            <input className="pi-input" value={time} onChange={e => setTime(e.target.value)} onBlur={save} />
          </div>
          <div className="scratch-insp-section">
            <div className="scratch-insp-label">LOCATION</div>
            <input className="pi-input" value={where} onChange={e => setWhere(e.target.value)} onBlur={save} />
          </div>
          <div className="scratch-insp-section">
            <div className="scratch-insp-label">TAGS</div>
            <div className="pi-tag-row">
              {tags.map(t => (
                <span key={t} className="pi-tag">{t}<button onClick={() => removeTag(t)}>×</button></span>
              ))}
              <input
                className="pi-tag-input"
                value={newTag}
                onChange={e => setNewTag(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') addTag(); }}
                placeholder="+ tag"
              />
            </div>
          </div>
        </div>
        <div className="scratch-insp-foot">
          <button className="danger" onClick={() => { onUpdate(eventKey, { deleted: true }); onClose(); }}>🗑 DELETE</button>
          <button onClick={() => { onUpdate(eventKey, { hidden: !hidden }); onClose(); }} style={{color: hidden ? 'var(--accent)' : 'var(--warn)', borderColor: hidden ? 'var(--accent)' : 'var(--warn)'}}>
            {hidden ? '👁 UNHIDE' : '👁 HIDE'}
          </button>
          <button onClick={onClose}>DONE</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// UNDO SEND — 3-second toast with countdown + UNDO button.
// When the 3s elapses (handled in App), a whoosh plays and the email commits.
// ─────────────────────────────────────────────────────────────────────────────
const UNDO_SNARKS = [
  "now's your chance to write something better",
  "are you sure you're giving up already",
  "last call. last, last call.",
  "re-reading it now, huh? rude.",
  "spellcheck. trust me.",
  "proofread while you still can",
  "the regret window is closing",
  "spelling. check the spelling.",
  "tone was… choices were made",
  "committed. mostly.",
  "fine. send it. fine.",
  "auto-correct had opinions",
];
function UndoToast({ pending, onUndo, kind = 'email' }) {
  const [remaining, setRemaining] = useState(3);
  const snark = useMemo(() => UNDO_SNARKS[Math.floor(Math.random() * UNDO_SNARKS.length)], [pending.deadline]);
  useEffect(() => {
    const id = setInterval(() => {
      const ms = Math.max(0, pending.deadline - Date.now());
      setRemaining(Math.ceil(ms / 1000));
      if (ms <= 0) clearInterval(id);
    }, 100);
    return () => clearInterval(id);
  }, [pending.deadline]);
  const verb = kind === 'text' ? 'texting' : 'sending to';
  return (
    <div className="undo-toast">
      <div className="undo-toast-row">
        <span className="undo-dot" />
        <span className="undo-text">{verb} {pending.to}</span>
        <span className="undo-count">{remaining}s</span>
        <button className="undo-btn" onClick={onUndo}>UNDO</button>
      </div>
      <div className="undo-snark">α: {snark}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// TEXT COMPOSER — SMS-style write/dictate/improve flow. Reuses the same
// suggest + dictate + improve pattern as InboxReader but tighter.
// ─────────────────────────────────────────────────────────────────────────────
function TextComposer({ target, onClose, onSend }) {
  const [draft, setDraft] = useState(target.__restoreDraft || '');
  const [streaming, setStreaming] = useState(false);
  const [recording, setRecording] = useState(false);
  const [liveTranscript, setLiveTranscript] = useState('');
  const [improving, setImproving] = useState(false);
  const [confirmClose, setConfirmClose] = useState(false);
  const recogRef = useRef(null);
  const hasKey = !!localStorage.getItem('alfredo:anthropic_key');

  const sysFor = (mode) => [
    'You write short SMS text messages on behalf of Todd. Tone: warm, concise, casual — how a human actually texts. Lowercase, contractions, 1–2 sentences typically, no emoji unless the context is playful.',
    mode === 'improve' ? 'You are IMPROVING raw dictation. Preserve intent + voice. Fix grammar, drop filler, tighten.' : '',
    target.context ? 'Context: ' + target.context : '',
    `Recipient: ${target.to}`,
  ].filter(Boolean).join('\n');

  const suggest = async () => {
    const key = localStorage.getItem('alfredo:anthropic_key');
    if (!key) return;
    setStreaming(true);
    setDraft('');
    try {
      await window.streamClaude({
        apiKey: key, system: sysFor('suggest'),
        userText: 'Draft a text to ' + target.to + '. Output ONLY the message body. Keep it short.',
        onDelta: (chunk) => setDraft(d => d + chunk),
        model: 'claude-haiku-4-5-20251001',
        maxTokens: 200,
      });
    } catch (e) { setDraft(d => d + '\n[error: ' + e.message + ']'); }
    finally { setStreaming(false); }
  };

  const improve = async () => {
    const key = localStorage.getItem('alfredo:anthropic_key');
    if (!key || !draft.trim()) return;
    setImproving(true);
    const raw = draft;
    setDraft('');
    try {
      await window.streamClaude({
        apiKey: key, system: sysFor('improve'),
        userText: 'Raw dictation/draft to polish for SMS:\n\n' + raw + '\n\nReturn ONLY the cleaned text message body.',
        onDelta: (chunk) => setDraft(d => d + chunk),
        model: 'claude-haiku-4-5-20251001',
        maxTokens: 200,
      });
    } catch (e) { setDraft(raw + '\n[improve failed]'); }
    finally { setImproving(false); }
  };

  const toggleDictate = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { window.alfToast?.('speech recognition not supported here', { tone: 'warn' }); return; }
    if (recording) { recogRef.current?.stop(); return; }
    const r = new SR();
    r.continuous = true; r.interimResults = true; r.lang = 'en-US';
    let finalText = '';
    r.onresult = (ev) => {
      let interim = '';
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const t = ev.results[i][0].transcript;
        if (ev.results[i].isFinal) finalText += t + ' ';
        else interim += t;
      }
      setLiveTranscript((finalText + interim).trim());
    };
    r.onerror = (e) => { setRecording(false); if (e.error !== 'no-speech') window.alfToast?.('dictation error: ' + e.error, { tone: 'bad' }); };
    r.onend = () => {
      setRecording(false);
      const t = finalText.trim();
      if (t) setDraft(d => (d ? d + ' ' : '') + t);
      setLiveTranscript('');
    };
    recogRef.current = r;
    setRecording(true);
    r.start();
  };

  const attemptClose = () => {
    if (draft.trim()) {
      setConfirmClose(true);
    } else {
      onClose();
    }
  };

  const saveDraft = () => {
    try {
      const drafts = JSON.parse(localStorage.getItem('alfredo:textDrafts') || '[]');
      drafts.push({ id: 'drf-' + Date.now().toString(36), to: target.to, phone: target.phone, body: draft, context: target.context, savedAt: Date.now() });
      localStorage.setItem('alfredo:textDrafts', JSON.stringify(drafts.slice(-20)));
    } catch {}
    onClose();
  };

  const canSend = draft.trim().length > 0 && !streaming && !improving;

  return (
    <div className="inbox-reader-backdrop" onClick={attemptClose}>
      <div className="inbox-reader" onClick={e => e.stopPropagation()} style={{ width: 440 }}>
        <div className="inbox-reader-head">
          <span>TEXT · SMS</span>
          <button className="tweaks-close" onClick={attemptClose}>✕</button>
        </div>

        <div className="inbox-reader-body">
          <div className="inbox-reader-meta">
            <div className="inbox-reader-from">To: {target.to}</div>
            <div className="inbox-reader-email">{target.phone}</div>
            {target.context && <div className="inbox-reader-email" style={{ marginTop: 4, color: 'var(--text-dim)' }}>{target.context}</div>}
          </div>

          <div className="inbox-reader-actions">
            <button className="primary" onClick={suggest} disabled={streaming || improving || !hasKey}>
              {streaming ? 'DRAFTING…' : '✨ SUGGEST'}
            </button>
            <button onClick={() => document.querySelector('.inbox-compose textarea')?.focus()} disabled={streaming || improving}>✎ WRITE MY OWN</button>
            <button className={`mic ${recording ? 'recording' : ''}`} onClick={toggleDictate} disabled={streaming || improving}>
              {recording ? '● STOP' : '🎙 DICTATE'}
            </button>
          </div>

          {recording && <div className="inbox-dictation-live">{liveTranscript || 'listening…'}</div>}

          <div className="inbox-compose">
            <div className="inbox-compose-label">
              MESSAGE
              {draft && hasKey && !streaming && !improving && !recording && (
                <span className="hint">
                  · <button
                    style={{ color: 'var(--accent)', fontFamily: 'var(--mono)', fontSize: 9, cursor: 'pointer', background: 'none', border: 'none', padding: 0, textDecoration: 'underline' }}
                    onClick={improve}
                  >improve via claude</button>
                </span>
              )}
            </div>
            <textarea
              value={draft}
              onChange={(e) => setDraft(e.target.value)}
              placeholder={hasKey ? 'type or tap ✨ / 🎙' : 'set api key in TWEAKS to enable ai assist'}
              disabled={streaming || improving}
              rows={4}
            />
          </div>
        </div>

        <div className="inbox-reader-foot">
          <button className="clear" disabled={!draft || streaming || improving} onClick={() => setDraft('')}>CLEAR TEXT</button>
          <div style={{ flex: 1 }} />
          <button onClick={attemptClose}>CLOSE</button>
          <button className="send" disabled={!canSend} onClick={() => onSend(draft)}>SEND</button>
        </div>

        {confirmClose && (
          <div className="draft-confirm">
            <div className="draft-confirm-text">save draft before closing?</div>
            <div className="draft-confirm-actions">
              <button className="tweaks-btn" onClick={() => { setConfirmClose(false); }}>KEEP EDITING</button>
              <button className="tweaks-btn" onClick={() => { setDraft(''); onClose(); }}>DISCARD</button>
              <button className="tweaks-btn" style={{ color: 'var(--good)', borderColor: 'var(--good)' }} onClick={saveDraft}>SAVE DRAFT</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// INBOX READER — tap an email → full message, then compose a reply three ways:
// (1) ✨ SUGGEST — Claude streams a deadpan, context-aware reply into the box
// (2) ✎ Type freely in the textarea
// (3) 🎙 DICTATE — browser SpeechRecognition captures speech; IMPROVE sends the
//     raw transcript to Claude to polish while preserving your voice.
// ─────────────────────────────────────────────────────────────────────────────
function InboxReader({ email, onClose, onSend }) {
  // Restore a draft if one was preserved by the undo flow.
  const [draft, setDraft] = useState(email.__restoreDraft || email.__draftBody || '');
  const [streaming, setStreaming] = useState(false);
  const [recording, setRecording] = useState(false);
  const [liveTranscript, setLiveTranscript] = useState('');
  const [improving, setImproving] = useState(false);
  const [confirmClose, setConfirmClose] = useState(false);
  const recogRef = useRef(null);
  const isReadOnly = !!email.__sent;

  const attemptClose = () => {
    if (!isReadOnly && draft.trim()) setConfirmClose(true);
    else onClose();
  };
  const saveDraft = () => {
    try {
      const drafts = JSON.parse(localStorage.getItem('alfredo:mailDrafts') || '[]');
      // If editing a draft, replace it; else append
      const id = email.__draftId || 'drf-' + Date.now().toString(36);
      const next = drafts.filter(d => d.id !== id);
      next.push({
        id, to: email.from, toEmail: email.email,
        subject: (email.subject || '').startsWith('Re:') ? email.subject : 'Re: ' + (email.subject || ''),
        body: draft,
        replyingTo: { from: email.from, subject: email.subject, snippet: email.snippet, body: email.body },
        savedAt: Date.now(),
      });
      localStorage.setItem('alfredo:mailDrafts', JSON.stringify(next.slice(-20)));
    } catch {}
    onClose();
  };

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape' && !recording) onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose, recording]);

  const hasKey = !!localStorage.getItem('alfredo:anthropic_key');

  const systemForReply = (mode) => [
    'You write email replies on behalf of Todd. PERSONA: concise, warm but direct, mildly dry. Lowercase is fine for informal recipients; match the formality of the incoming note.',
    'Default length: 3–6 short sentences. Never use markdown, emoji, or signatures — just the body.',
    mode === 'improve' ? 'You are IMPROVING the user\'s raw dictation. Preserve their voice and intent. Fix grammar, remove filler ("um", "uh", "like"), tighten phrasing. DO NOT change the message substance.' : '',
    '',
    `INCOMING EMAIL`,
    `From: ${email.from} <${email.email || ''}>`,
    `Subject: ${email.subject}`,
    '',
    email.body || email.snippet,
  ].filter(Boolean).join('\n');

  const suggestReply = async () => {
    const key = localStorage.getItem('alfredo:anthropic_key');
    if (!key) { window.alfToast?.('set an api key in TWEAKS first', { tone: 'warn' }); return; }
    setStreaming(true);
    setDraft('');
    try {
      await window.streamClaude({
        apiKey: key,
        system: systemForReply('suggest'),
        userText: 'Draft a reply now. Output ONLY the reply body, no preamble.',
        onDelta: (chunk) => setDraft(d => d + chunk),
        model: 'claude-sonnet-4-6',
        maxTokens: 500,
      });
    } catch (e) {
      setDraft(d => d + '\n[error: ' + e.message + ']');
    } finally {
      setStreaming(false);
    }
  };

  const improveDictation = async (transcript) => {
    const key = localStorage.getItem('alfredo:anthropic_key');
    if (!key) { setDraft(transcript); return; }
    setImproving(true);
    setDraft('');
    try {
      await window.streamClaude({
        apiKey: key,
        system: systemForReply('improve'),
        userText: 'Raw dictation to clean up:\n\n' + transcript + '\n\nReturn the improved reply body only.',
        onDelta: (chunk) => setDraft(d => d + chunk),
        model: 'claude-sonnet-4-6',
        maxTokens: 500,
      });
    } catch (e) {
      setDraft(transcript + '\n\n[improve failed: ' + e.message + ']');
    } finally {
      setImproving(false);
    }
  };

  const toggleDictate = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      window.alfToast?.('speech recognition needs chrome, edge, or safari', { tone: 'warn' });
      return;
    }
    if (recording) {
      recogRef.current?.stop();
      return;
    }
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = 'en-US';
    let finalText = '';
    r.onresult = (ev) => {
      let interim = '';
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const t = ev.results[i][0].transcript;
        if (ev.results[i].isFinal) finalText += t + ' ';
        else interim += t;
      }
      setLiveTranscript((finalText + interim).trim());
    };
    r.onerror = (e) => {
      setRecording(false);
      if (e.error !== 'no-speech') window.alfToast?.('dictation error: ' + e.error, { tone: 'bad' });
    };
    r.onend = () => {
      setRecording(false);
      const transcript = (finalText).trim();
      if (transcript) {
        // drop raw into draft; user can SEND as-is or tap IMPROVE to polish
        setDraft(d => (d ? d + '\n\n' : '') + transcript);
      }
      setLiveTranscript('');
    };
    recogRef.current = r;
    setLiveTranscript('');
    setRecording(true);
    r.start();
  };

  const canSend = draft.trim().length > 0 && !streaming && !improving;

  return (
    <div className="inbox-reader-backdrop" onClick={() => { if (!recording) attemptClose(); }}>
      <div className="inbox-reader" onClick={e => e.stopPropagation()}>
        <div className="inbox-reader-head">
          <span>{isReadOnly ? 'SENT · ' + new Date(email.sentAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'INBOX · ' + email.classified}</span>
          <button className="tweaks-close" onClick={attemptClose}>✕</button>
        </div>

        <div className="inbox-reader-body">
          <div className="inbox-reader-meta">
            <div className="inbox-reader-from">{isReadOnly ? 'To: ' + email.from : email.from}</div>
            <div className="inbox-reader-email">{email.email} · {email.age || ''}</div>
            <div className="inbox-reader-subject">{email.subject}</div>
          </div>

          <div className="inbox-reader-message">{email.body || email.snippet}</div>

          {!isReadOnly && (
            <>
              <div className="inbox-reader-actions">
                <button className="primary" onClick={suggestReply} disabled={streaming || improving || !hasKey} title={!hasKey ? 'set api key in TWEAKS' : ''}>
                  {streaming ? 'DRAFTING…' : '✨ SUGGEST REPLY'}
                </button>
                {/* WRITE MY OWN just focuses the textarea; doesn't wipe existing text */}
                <button onClick={() => document.querySelector('.inbox-compose textarea')?.focus()} disabled={streaming || improving}>✎ WRITE MY OWN</button>
                <button className={`mic ${recording ? 'recording' : ''}`} onClick={toggleDictate} disabled={streaming || improving}>
                  {recording ? '● STOP' : '🎙 DICTATE'}
                </button>
              </div>

              {recording && (
                <div className="inbox-dictation-live">{liveTranscript || 'listening…'}</div>
              )}

              <div className="inbox-compose">
                <div className="inbox-compose-label">
                  REPLY
                  {draft && hasKey && !streaming && !improving && !recording && (
                    <span className="hint">
                      · <button
                        style={{ color: 'var(--accent)', fontFamily: 'var(--mono)', fontSize: 9, cursor: 'pointer', background: 'none', border: 'none', padding: 0, textDecoration: 'underline' }}
                        onClick={() => improveDictation(draft)}
                        disabled={improving}
                      >improve via claude</button>
                    </span>
                  )}
                  {improving && <span className="hint">· polishing…</span>}
                </div>
                <textarea
                  value={draft}
                  onChange={(e) => setDraft(e.target.value)}
                  placeholder={hasKey ? 'type, tap ✨ for a draft, or 🎙 to dictate' : 'set api key in TWEAKS to enable ai assist'}
                  disabled={streaming || improving}
                />
              </div>
            </>
          )}
        </div>

        <div className="inbox-reader-foot">
          {!isReadOnly && (
            <button className="clear" disabled={!draft || streaming || improving} onClick={() => setDraft('')}>CLEAR TEXT</button>
          )}
          <div style={{ flex: 1 }} />
          <button onClick={attemptClose}>CLOSE</button>
          {!isReadOnly && (
            <button className="send" disabled={!canSend} onClick={() => onSend(draft)}>SEND</button>
          )}
        </div>

        {confirmClose && !isReadOnly && (
          <div className="draft-confirm">
            <div className="draft-confirm-text">save draft before closing?</div>
            <div className="draft-confirm-actions">
              <button className="tweaks-btn" onClick={() => setConfirmClose(false)}>KEEP EDITING</button>
              <button className="tweaks-btn" onClick={() => { setDraft(''); onClose(); }}>DISCARD</button>
              <button className="tweaks-btn" style={{ color: 'var(--good)', borderColor: 'var(--good)' }} onClick={saveDraft}>SAVE DRAFT</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function TweaksPanel({ s, update, onClose, sketchMode, setSketchMode, sketches, setSketches, surface, onSuggest, collapsed, setCollapsed }) {
  const [apiKeyDraft, setApiKeyDraft] = useState(() => localStorage.getItem('alfredo:anthropic_key') || '');
  const [apiKeyEditing, setApiKeyEditing] = useState(false);
  const [keyTestResult, setKeyTestResult] = useState(null); // { ok, msg }
  const keyPresent = !!apiKeyDraft;
  const maskedKey = apiKeyDraft ? apiKeyDraft.slice(0, 8) + '…' + apiKeyDraft.slice(-4) : '';

  const testKey = async () => {
    const key = localStorage.getItem('alfredo:anthropic_key') || apiKeyDraft.trim();
    if (!key) { setKeyTestResult({ ok: false, msg: 'no key set' }); return; }
    setKeyTestResult({ ok: null, msg: 'testing…' });
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
          'content-type': 'application/json',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 8,
          messages: [{ role: 'user', content: 'reply with just: ok' }],
        }),
      });
      if (resp.ok) {
        const json = await resp.json();
        const reply = (json.content?.[0]?.text || '').trim().toLowerCase();
        setKeyTestResult({ ok: true, msg: `✓ key works · reply: "${reply.slice(0, 20)}"` });
      } else {
        const err = await resp.text();
        let parsed = err;
        try { parsed = JSON.parse(err).error?.message || err; } catch {}
        setKeyTestResult({ ok: false, msg: `✕ ${resp.status}: ${parsed.slice(0, 100)}` });
      }
    } catch (e) {
      setKeyTestResult({ ok: false, msg: '✕ ' + (e.message || 'network error') });
    }
  };
  const palettes = [
    { id: 'blue', color: '#8ab4f8' },
    { id: 'phosphor', color: '#5cf2a4' },
    { id: 'amber', color: '#ffb454' },
    { id: 'tokyo', color: '#bb9af7' },
  ];

  const btn = (active, onClick, label) => (
    <button className={`tweaks-btn ${active ? 'active' : ''}`} onClick={onClick}>{label}</button>
  );

  return (
    <div className="tweaks-panel">
      <div className="tweaks-head">
        <span>⚙ TWEAKS</span>
        <button className="tweaks-close" onClick={onClose}>✕</button>
      </div>

      <div className="tweaks-group">
        <div className="tweaks-label">SURFACE</div>
        <div className="tweaks-row">
          {btn(s.surface === 'kiosk', () => update({ surface: 'kiosk' }), 'KIOSK')}
          {btn(s.surface === 'macos', () => update({ surface: 'macos' }), 'MACOS')}
          {btn(s.surface === 'ios', () => update({ surface: 'ios' }), 'iOS')}
        </div>
      </div>

      <div className="tweaks-group">
        <div className="tweaks-label">MODE · {(s.mode === 'auto' ? 'AUTO · ' + resolveMode('auto') : s.mode).toUpperCase()}</div>
        <div className="tweaks-row">
          {btn(s.mode === 'auto', () => update({ mode: 'auto' }), 'AUTO')}
          {btn(s.mode === 'work', () => update({ mode: 'work' }), 'WORK')}
          {btn(s.mode === 'weekend', () => update({ mode: 'weekend' }), 'WEEKEND')}
          {btn(s.mode === 'night', () => update({ mode: 'night' }), 'NIGHT')}
          {btn(s.mode === 'focus', () => update({ mode: 'focus' }), 'FOCUS')}
          {btn(s.mode === 'meeting', () => update({ mode: 'meeting' }), 'MEETING')}
        </div>
      </div>

      <div className="tweaks-group">
        <div className="tweaks-label">PALETTE</div>
        <div className="tweaks-row">
          {palettes.map(p => (
            <button
              key={p.id}
              className={`tweaks-swatch ${s.palette === p.id ? 'active' : ''}`}
              style={{ background: p.color }}
              onClick={() => update({ palette: p.id })}
              title={p.id}
            />
          ))}
        </div>
      </div>

      <div className="tweaks-group">
        <div className="tweaks-label">FONT</div>
        <div className="tweaks-row">
          {btn(s.font === 'jetbrains', () => update({ font: 'jetbrains' }), 'JETBRAINS')}
          {btn(s.font === 'plex', () => update({ font: 'plex' }), 'PLEX')}
          {btn(s.font === 'geist', () => update({ font: 'geist' }), 'GEIST')}
        </div>
      </div>

      <div className="tweaks-group">
        <div className="tweaks-label">CHROME · {s.chrome === 0 ? 'CLEAN' : s.chrome === 1 ? 'OPERATOR' : 'FULL HUD'}</div>
        <input
          type="range"
          min="0" max="2" step="1"
          value={s.chrome}
          onChange={e => update({ chrome: parseInt(e.target.value) })}
          className="tweaks-slider"
        />
      </div>

      <div className="tweaks-group">
        <div className="tweaks-label">DENSITY</div>
        <div className="tweaks-row">
          {btn(s.density === 'default', () => update({ density: 'default' }), 'DEFAULT')}
          {btn(s.density === 'tight', () => update({ density: 'tight' }), 'TIGHT')}
        </div>
      </div>

      <div className="tweaks-group">
        <div className="tweaks-label">CONFIDENCE · VIZ</div>
        <div className="tweaks-row">
          {btn(s.confVariant === 'dot', () => update({ confVariant: 'dot' }), 'DOT')}
          {btn(s.confVariant === 'pct', () => update({ confVariant: 'pct' }), '%')}
          {btn(s.confVariant === 'fade', () => update({ confVariant: 'fade' }), 'FADE')}
        </div>
      </div>

      <div className="tweaks-group">
        <div className="tweaks-label">FOCUS · MODE</div>
        <div className="tweaks-row">
          {btn(s.focusVariant === 'spotlight', () => update({ focusVariant: 'spotlight' }), 'SPOTLIGHT')}
          {btn(s.focusVariant === 'blackout', () => update({ focusVariant: 'blackout' }), 'BLACKOUT')}
          {btn(s.focusVariant === 'zoom', () => update({ focusVariant: 'zoom' }), 'ZOOM')}
        </div>
      </div>

      <div className="tweaks-group" style={{borderTop: '1px dashed var(--line)', paddingTop: 10, marginTop: 4}}>
        <div className="tweaks-label">PANES · {Object.values(collapsed || {}).filter(Boolean).length} COLLAPSED</div>
        <div className="tweaks-row">
          <button className="tweaks-btn" onClick={() => setCollapsed({})}>EXPAND ALL</button>
        </div>
        <div style={{fontSize: 9, color: 'var(--muted)', marginTop: 4, lineHeight: 1.4}}>
          tap any pane title to collapse it. siblings below slide up into the space.
        </div>
      </div>

      <div className="tweaks-group" style={{borderTop: '1px dashed var(--line)', paddingTop: 10, marginTop: 4}}>
        <div className="tweaks-label">CLAUDE.TTY · {keyPresent ? 'LIVE · sonnet' : 'STUB'}</div>
        {apiKeyEditing ? (
          <>
            <input
              type="password"
              autoFocus
              value={apiKeyDraft}
              onChange={(e) => setApiKeyDraft(e.target.value)}
              placeholder="sk-ant-…"
              style={{
                fontFamily: 'var(--mono)', fontSize: 10,
                background: 'var(--bg-2)', border: '1px solid var(--line-2)',
                padding: '6px 8px', color: 'var(--text)', width: '100%'
              }}
            />
            <div className="tweaks-row">
              <button
                className="tweaks-btn"
                onClick={() => {
                  if (apiKeyDraft.trim()) localStorage.setItem('alfredo:anthropic_key', apiKeyDraft.trim());
                  setApiKeyEditing(false);
                }}
              >SAVE</button>
              <button
                className="tweaks-btn"
                onClick={() => {
                  localStorage.removeItem('alfredo:anthropic_key');
                  setApiKeyDraft('');
                  setApiKeyEditing(false);
                }}
              >CLEAR</button>
              <button className="tweaks-btn" onClick={() => setApiKeyEditing(false)}>CANCEL</button>
            </div>
          </>
        ) : (
          <div className="tweaks-row">
            <button className="tweaks-btn" onClick={() => setApiKeyEditing(true)}>
              {keyPresent ? `EDIT · ${maskedKey}` : '+ SET API KEY'}
            </button>
            {keyPresent && <button className="tweaks-btn" onClick={testKey}>TEST</button>}
          </div>
        )}
        {keyTestResult && (
          <div style={{
            fontSize: 9,
            color: keyTestResult.ok === true ? 'var(--good)' : keyTestResult.ok === false ? 'var(--bad)' : 'var(--muted)',
            marginTop: 4, lineHeight: 1.4, wordBreak: 'break-word'
          }}>
            {keyTestResult.msg}
          </div>
        )}
        <div style={{fontSize: 9, color: 'var(--muted)', marginTop: 4, lineHeight: 1.4}}>
          key is stored in localStorage on this machine only. streams direct from anthropic api with prompt caching. sonnet 4.6.
        </div>
      </div>

      <div className="tweaks-group" style={{borderTop: '1px dashed var(--line)', paddingTop: 10, marginTop: 4}}>
        <div className="tweaks-label">α · PROACTIVE</div>
        <div className="tweaks-row">
          <button className="tweaks-btn" onClick={onSuggest}>SUGGEST NOW</button>
        </div>
        <div style={{fontSize: 9, color: 'var(--muted)', marginTop: 4, lineHeight: 1.4}}>
          auto-runs every 30 min. output lands in SCRATCH.PAD with an α accent. calendar writes always need your tap.
        </div>
      </div>

      <div className="tweaks-group" style={{borderTop: '1px dashed var(--line)', paddingTop: 10, marginTop: 4}}>
        <div className="tweaks-label">SKETCH · NEW WIDGETS ON {(surface || 'kiosk').toUpperCase()}</div>
        <div className="tweaks-row">
          {btn(sketchMode === 'off', () => setSketchMode('off'), 'OFF')}
          {btn(sketchMode === 'draw', () => setSketchMode('draw'), '+ DRAW')}
          {btn(sketchMode === 'edit', () => setSketchMode('edit'), '✎ EDIT')}
        </div>
        {(sketches[surface] || []).length > 0 && (
          <div style={{marginTop: 8, display: 'flex', flexDirection: 'column', gap: 3}}>
            {(sketches[surface] || []).map(w => (
              <div key={w.id} style={{fontSize: 9, color: 'var(--text-dim)', display: 'flex', gap: 6}}>
                <span style={{color: 'var(--accent)', flexShrink: 0}}>·</span>
                <span style={{flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>
                  {w.label || 'untitled'}
                </span>
                <span style={{color: 'var(--muted)'}}>{w.w}×{w.h}</span>
              </div>
            ))}
          </div>
        )}
        <div className="tweaks-row" style={{marginTop: 6}}>
          <button
            className="tweaks-btn"
            disabled={!Object.values(sketches).some(v => v && v.length)}
            onClick={async () => {
              const json = JSON.stringify(sketches, null, 2);
              try {
                await navigator.clipboard.writeText(json);
                window.alfToast?.('copied ' + Object.values(sketches).reduce((n, v) => n + (v?.length || 0), 0) + ' widget sketches to clipboard', { tone: 'good' });
              } catch {
                // fallback: open in new window so user can copy manually
                const w = window.open();
                w.document.write('<pre>' + json.replace(/</g, '&lt;') + '</pre>');
              }
            }}
          >EXPORT JSON</button>
          <button
            className="tweaks-btn"
            disabled={!(sketches[surface] || []).length}
            onClick={() => {
              window.alfConfirm?.(
                'Remove all sketches on ' + (surface || 'this surface').toUpperCase() + '?',
                () => setSketches(prev => ({ ...prev, [surface]: [] }))
              );
            }}
          >CLEAR</button>
        </div>
      </div>

      <div className="tweaks-group" style={{opacity: 0.6, borderTop: '1px dashed var(--line)', paddingTop: 10, marginTop: 4}}>
        <div style={{fontSize: 9, color: 'var(--muted)', lineHeight: 1.5}}>
          long-press any priority in DAILY.BRIEF to enter focus mode. tap blank ◌ in SCRATCH.PAD to add. ask CLAUDE.TTY anything — it's live.
          <br/><br/>
          <b>sketch:</b> DRAW → click-drag on the surface to size a new widget, then label + describe. EDIT → drag the header to move, corner to resize, ✎ to edit meta, × to delete. EXPORT to share the JSON with me.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
