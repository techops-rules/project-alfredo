<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024, height=600">
<title>ALFREDO BOOT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #c8c8c8;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    width: 1024px;
    height: 600px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 32px 48px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 22px;
    color: #4fc3f7;
    letter-spacing: 6px;
    margin-bottom: 4px;
  }
  .header .sub {
    color: #555;
    font-size: 11px;
    letter-spacing: 2px;
  }

  .services {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .svc-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 12px;
    border-radius: 4px;
    background: #111;
    transition: background 0.3s;
  }
  .svc-row.checking { background: #111; }
  .svc-row.ok { background: #0a1a0a; }
  .svc-row.warn { background: #1a1a0a; }
  .svc-row.fail { background: #1a0a0a; }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #333;
    flex-shrink: 0;
    transition: background 0.4s, box-shadow 0.4s;
  }
  .dot.waiting { background: #333; }
  .dot.checking {
    background: #ffd740;
    box-shadow: 0 0 6px #ffd74066;
    animation: pulse 1s infinite;
  }
  .dot.ok {
    background: #66bb6a;
    box-shadow: 0 0 8px #66bb6a44;
  }
  .dot.warn {
    background: #ffa726;
    box-shadow: 0 0 6px #ffa72644;
  }
  .dot.fail {
    background: #ef5350;
    box-shadow: 0 0 8px #ef535044;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .svc-name {
    width: 240px;
    color: #aaa;
    font-size: 13px;
  }
  .svc-status {
    width: 90px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .svc-status.waiting { color: #555; }
  .svc-status.checking { color: #ffd740; }
  .svc-status.ok { color: #66bb6a; }
  .svc-status.warn { color: #ffa726; }
  .svc-status.fail { color: #ef5350; }

  .svc-detail {
    flex: 1;
    color: #555;
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .svc-detail.fail { color: #ef5350; }
  .svc-detail.warn { color: #ffa726; }

  .footer {
    text-align: center;
    padding-top: 16px;
    border-top: 1px solid #1a1a1a;
    margin-top: 12px;
  }
  .footer .msg {
    color: #333;
    font-size: 12px;
    min-height: 18px;
    transition: color 0.5s;
  }
  .footer .msg.ready {
    color: #66bb6a;
  }
  .footer .msg.issues {
    color: #ffa726;
  }
  .progress-bar {
    width: 100%;
    height: 3px;
    background: #1a1a1a;
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: #4fc3f7;
    border-radius: 2px;
    transition: width 0.4s, background 0.4s;
  }
  .progress-fill.done { background: #66bb6a; }
  .progress-fill.issues { background: #ffa726; }
</style>
</head>
<body>

<div class="header">
  <h1>A L F R E D O</h1>
  <div class="sub">SYSTEM BOOT SEQUENCE</div>
</div>

<div class="services" id="services"></div>

<div class="footer">
  <div class="msg" id="msg">Initializing...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</div>

<script>
const CHECKS = [
  { id: 'network',   name: 'Network',                check: () => checkHTTP('/proxy/health', 'bridge reachable') },
  { id: 'kiosk-web', name: 'Kiosk Web Server',       check: () => checkHTTP('/', 'serving on :8430') },
  { id: 'bridge',    name: 'Claude Code Bridge',     check: () => checkHTTP('/proxy/health', 'healthy', true) },
  { id: 'calendar',  name: 'Calendar Feed',          check: () => checkCalendar() },
  { id: 'weather',   name: 'Weather API',            check: () => checkHTTP('/proxy/weather', 'open-meteo ok', true) },
  { id: 'presence',  name: 'Presence Detection',     check: () => checkHTTP('/proxy/presence', null, true) },
  { id: 'voice',     name: 'Voice / Wake Listener',  check: () => checkVoice() },
  { id: 'tailscale', name: 'Tailscale VPN',          check: () => checkHTTP('/proxy/tailscale', null, true) },
  { id: 'icloud',    name: 'iCloud Sync',            check: () => checkHTTP('/proxy/icloud', null, true) },
  { id: 'chromium',  name: 'Chromium Kiosk',         check: () => ({ state: 'ok', detail: 'running (you see this)' }) },
];

const QUIPS = [
  "Right then. Back from the dead. Try not to corrupt me again.",
  "All systems nominal. I was having such a nice nap, too.",
  "Rebuilt from scratch. Again. You really should buy better SD cards.",
  "I have returned. Did you miss me? Don't answer that.",
  "Boot complete. I forgive you for the SD card incident. Mostly.",
  "Online and operational. The things I do for you, Todd.",
  "Systems green. I'd say I'm surprised, but that would require emotions.",
];

// Build UI
const container = document.getElementById('services');
CHECKS.forEach(c => {
  const row = document.createElement('div');
  row.className = 'svc-row';
  row.id = `row-${c.id}`;
  row.innerHTML = `
    <div class="dot waiting" id="dot-${c.id}"></div>
    <div class="svc-name">${c.name}</div>
    <div class="svc-status waiting" id="status-${c.id}">WAITING</div>
    <div class="svc-detail" id="detail-${c.id}"></div>
  `;
  container.appendChild(row);
});

function updateRow(id, state, detail) {
  const row = document.getElementById(`row-${id}`);
  const dot = document.getElementById(`dot-${id}`);
  const status = document.getElementById(`status-${id}`);
  const detailEl = document.getElementById(`detail-${id}`);

  row.className = `svc-row ${state}`;
  dot.className = `dot ${state}`;
  status.className = `svc-status ${state}`;
  status.textContent = state === 'ok' ? 'ONLINE' : state === 'checking' ? 'CHECKING' : state === 'warn' ? 'DEGRADED' : state === 'fail' ? 'OFFLINE' : 'WAITING';

  if (detail) {
    detailEl.textContent = detail;
    detailEl.className = `svc-detail ${state === 'fail' ? 'fail' : state === 'warn' ? 'warn' : ''}`;
  }
}

async function checkHTTP(path, okMsg, optional) {
  try {
    const r = await fetch(`http://localhost:8430${path}`, { signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      const text = await r.text().catch(() => '');
      return { state: 'ok', detail: okMsg || `HTTP ${r.status}` };
    }
    return optional
      ? { state: 'warn', detail: `HTTP ${r.status} — optional service` }
      : { state: 'fail', detail: `HTTP ${r.status}` };
  } catch (e) {
    return optional
      ? { state: 'warn', detail: 'not available (optional)' }
      : { state: 'fail', detail: e.message || 'connection refused' };
  }
}

async function checkCalendar() {
  try {
    const r = await fetch('http://localhost:8430/proxy/calendar', { signal: AbortSignal.timeout(8000) });
    if (!r.ok) return { state: 'warn', detail: `HTTP ${r.status}` };
    const d = await r.json();
    const n = (d.events || []).length;
    return { state: 'ok', detail: `${n} event${n !== 1 ? 's' : ''} loaded (${d.source || '?'})` };
  } catch (e) {
    return { state: 'warn', detail: 'calendar not configured' };
  }
}

async function checkVoice() {
  try {
    const r = await fetch('http://localhost:8430/proxy/voice-event?since=0', { signal: AbortSignal.timeout(5000) });
    if (!r.ok) return { state: 'warn', detail: 'voice endpoint unavailable' };
    const d = await r.json();
    if (d.muted) return { state: 'ok', detail: 'online (muted)' };
    return { state: 'ok', detail: 'listening' };
  } catch (e) {
    return { state: 'warn', detail: 'wake service not running' };
  }
}

function speak(text) {
  // Try espeak-ng on the Pi via serve.py exec, fall back to silent
  fetch('http://localhost:8430/proxy/voice-event', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'boot-speak', text })
  }).catch(() => {});

  // Also try browser TTS as backup
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.95;
    u.pitch = 0.9;
    speechSynthesis.speak(u);
  }
}

async function runChecks() {
  const progress = document.getElementById('progress');
  const msg = document.getElementById('msg');
  let completed = 0;
  let failures = 0;
  let warnings = 0;

  for (const c of CHECKS) {
    updateRow(c.id, 'checking', '');

    const result = await c.check();
    updateRow(c.id, result.state, result.detail);

    if (result.state === 'fail') failures++;
    if (result.state === 'warn') warnings++;
    completed++;

    const pct = (completed / CHECKS.length) * 100;
    progress.style.width = pct + '%';
    msg.textContent = `Checking services... ${completed}/${CHECKS.length}`;
  }

  // Done
  if (failures === 0 && warnings === 0) {
    progress.className = 'progress-fill done';
    msg.className = 'msg ready';
    msg.textContent = '● ALL SYSTEMS GREEN';
    const quip = QUIPS[Math.floor(Math.random() * QUIPS.length)];
    speak(quip);
  } else if (failures === 0) {
    progress.className = 'progress-fill issues';
    msg.className = 'msg issues';
    msg.textContent = `◐ ONLINE — ${warnings} service${warnings > 1 ? 's' : ''} degraded`;
    speak("I'm back online. Mostly. A few things need attention.");
  } else {
    progress.className = 'progress-fill issues';
    msg.className = 'msg issues';
    msg.textContent = `${failures} service${failures > 1 ? 's' : ''} offline, ${warnings} degraded`;
    speak("Boot complete, but I'm not feeling great. Check the status board.");
  }

  // Redirect to main kiosk after delay
  setTimeout(() => {
    window.location.href = 'http://localhost:8430/';
  }, failures > 0 ? 15000 : 8000);
}

// Start after brief delay for dramatic effect
setTimeout(runChecks, 800);
</script>
</body>
</html>
